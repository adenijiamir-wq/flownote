[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[functions."send-reminders"]
  schedule = "* * * * *"

[functions."ai-pdf-background"]
  node_bundler = "node"

[functions."ai-pdf-status"]
  node_bundler = "node"

[[redirects]]
  from = "/api/ai"
  to = "/.netlify/functions/ai"
  status = 200

[[redirects]]
  from = "/api/send-reminders"
  to = "/.netlify/functions/send-reminders"
  status = 200

[[redirects]]
  from = "/api/ai-pdf-background"
  to = "/.netlify/functions/ai-pdf-background"
  status = 200

[[redirects]]
  from = "/api/ai-pdf-status"
  to = "/.netlify/functions/ai-pdf-status"
  status = 200
