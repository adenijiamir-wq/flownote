[build]
  publish = "."
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

# Reminder emails — runs every minute server-side
[functions."reminder-check"]
  schedule = "* * * * *"

# AI function — max timeout for Sonnet responses
[functions."ai"]
  timeout = 26

[[redirects]]
  from = "/api/ai"
  to = "/.netlify/functions/ai"
  status = 200
